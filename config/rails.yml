plugins:
  - rubocop-rails

#
# This file should be inherited alongside default.yml for Rails projects
#
# After you add a rule, sort this file with `bundle exec rubocop-gusto sort config/rails.yml`

AllCops:
  ActiveSupportExtensionsEnabled: true
  TargetRubyVersion: <%= RbConfig::CONFIG['RUBY_API_VERSION'] %>

Gusto/DiscouragedGem:
  Enabled: true
  Include:
    - '**/*.gemspec'
    - '**/Gemfile'
  Gems:
    timecop: "Use Rails' time helpers (e.g., freeze_time, travel_to) instead of Timecop."

Performance/DoubleStartEndWith:
  IncludeActiveSupportAliases: true

Rails/ActiveRecordAliases:
  Enabled: false

Rails/ApplicationRecord:
  AutoCorrect: true

Rails/BulkChangeTable:
  Enabled: false

Rails/Date:
  AutoCorrect: false

Rails/DefaultScope:
  Enabled: true

Rails/Delegate:
  # Incompatible with Sorbet
  Enabled: false
  EnforceForPrefixed: false

Rails/DynamicFindBy:
  AllowedMethods:
    - find_by_sql
    - find_by_uuid_or_id
    - find_by_uuid_or_id!

Rails/EagerEvaluationLogMessage:
  Enabled: true
  AutoCorrect: true

Rails/EnumHash:
  Include:
    - '**/app/models/**/*'

# Replaces the removed Gusto/RailsEnv cop, which was upstreamed as Rails/Env.
# Disabled by default in rubocop-rails, so we opt in here to preserve the prior behavior.
Rails/Env:
  Enabled: true

Rails/Exit:
  Include:
    - app/**/*
    - config/**/*
    - lib/**/*
    - packs/**/{app,lib}/**/*

Rails/FindEach:
  Include:
    - '**/app/models/**/*'

Rails/HasAndBelongsToMany:
  Include:
    - '**/app/models/**/*'

Rails/HasManyOrHasOneDependent:
  Enabled: false

Rails/HelperInstanceVariable:
  Include:
    - '**/app/helpers/**/*'

Rails/HttpPositionalArguments:
  AutoCorrect: true
  Include:
    - packs/**/spec/{controllers,fixture_generators}/**/*
    - spec/{controllers,fixture_generators}/**/*

Rails/IgnoredColumnsAssignment:
  Enabled: true

Rails/InverseOf:
  Include:
    - '**/app/models/**/*'

Rails/LexicallyScopedActionFilter:
  Include:
    - '**/app/controllers/**/*'
    - '**/app/mailers/**/*'

Rails/NotNullColumn:
  Enabled: false

Rails/ReadWriteAttribute:
  Enabled: false

Rails/UnknownEnv:
  Environments:
    - demo
    - development
    - production
    - staging
    - test

Rails/Validation:
  Include:
    - '**/models/**/*'
