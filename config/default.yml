plugins:
  - rubocop-rspec
  - rubocop-performance
  - rubocop-rake
  - rubocop-sorbet

# After you add a rule, sort this file with `bundle exec rubocop-gusto sort config/default.yml`

AllCops:
  TargetRubyVersion: <%= RbConfig::CONFIG['RUBY_API_VERSION'] %>
  MaxFilesInCache: 100000
  Exclude:
    - './.[!.]*'  # ignore all dotfiles
    - './.[!.]*/**/*'  # ignore all dot directories
    - 'config/boot.rb'
    - 'db/**/*schema.rb'
    - 'db/seeds{.rb,/**/*}'
  DisplayCopNames: true
  NewCops: disable
  SuggestExtensions: false

Bundler/OrderedGems:
  ConsiderPunctuation: true

FactoryBot/FactoryClassName:
  Include:
    - '**/factories/**/*'
    - '**/factories.rb'

FactoryBot/NoClassesOrModules:
  Include:
    - '**/spec/**/factories/*'

Gemspec/RequiredRubyVersion:
  # We don't want to enforce a Ruby version in each gemspec and gemfile for inline gems.
  # This rule is not helpful for apps with inlined gems, as we upgrade everything at once.
  # We manage our Ruby version in our version file and import that to our Gemfile.
  Enabled: false

Gusto/BootsnapLoadFile:
  Description: 'Do not use Bootsnap to load files. Use `require` instead.'

Gusto/DatadogConstant:
  Exclude:
    # calling DataDog directly only allowed in initializers, its library, and tests
    - 'config/application.rb'
    - 'config/initializers/datadog.rb'
    - 'lib/datadog/**/*'
    - '**/spec/**/*'
  Description: 'Do not call Datadog directly, use an appropriate wrapper library.'

Gusto/DiscouragedGem:
  Description: 'Flags installation of discouraged gems in Gemfiles and gemspecs.'
  # No gems are universally discouraged at this level; the list must be configured per project. See rails.yml.
  Enabled: false
  Gems: {}

Gusto/ExecuteMigration:
  Description: "Don't use `execute` in migrations. Use a backfill rake task instead."
  Include:
    - 'db/migrate/*.rb'

Gusto/FactoryClassesOrModules:
  Description: 'Do not define modules or classes in factory directories - they break reloading.'
  Include:
    - 'spec/**/factories/*.rb'

Gusto/MinByMaxBy:
  Description: 'Checks for the use of `min` or `max` with a proc. Corrects to `min_by` or `max_by`.'
  Safe: false
  Severity: error

Gusto/NoMetaprogramming:
  Description: >-
    Avoid using metaprogramming techniques like define_method and instance_eval
    which make code harder to understand and debug.

Gusto/NoRescueErrorMessageChecking:
  Description: 'Checks for the presence of error message checking within rescue blocks.'

Gusto/NoSend:
  Description: 'Do not call a private method via `__send__`.'
  Exclude:
    - '**/spec/**/*'

Gusto/PaperclipOrAttachable:
  Description: 'No more new paperclip or Attachable are allowed. Use ActiveStorage instead.'

Gusto/PerformClassMethod:
  Description: 'Prevents accidental definition of `perform` class methods (should be instance methods instead).'
  # List of modules that include Sidekiq::Worker.
  # Add your other base modules here if they include Sidekiq::Worker too.
  WorkerModules:
    - Sidekiq::Worker

Gusto/PolymorphicTypeValidation:
  Description: >-
    Ensures that polymorphic relations include a type validation,
    which is necessary for generating Sorbet types.
  Include:
    - '**/models/**/*.rb'

Gusto/PreferProcessLastStatus:
  Description: 'Prefer using `Process.last_status` instead of the global variables: `$?` and `$CHILD_STATUS`.'

Gusto/RablExtends:
  Description: >-
    Disallows the use of `extends` in Rabl templates due to poor caching performance.
    Inline the templating to generate your JSON instead.
  Include:
    - '**/*.json.rabl'

Gusto/RailsEnv:
  Description: 'Use Feature Flags or config instead of `Rails.env`.'

Gusto/RakeConstants:
  Description: >-
    Do not define a constant in rake file, because they are sometimes `load`ed instead of `require`d,
    which can lead to warnings about redefining constants.
  Include:
    - '**/*.rake'
    - 'Rakefile'

Gusto/RegexpBypass:
  Description: 'Ensures regular expressions use \A and \z anchors instead of ^ and $ for security validation.'
  Exclude:
    - '**/spec/**/*'
  Safe: false

Gusto/RspecDateTimeMock:
  Description: >-
    Don't mock Date/Time/DateTime directly.
    Use Rails Testing Time Helpers (eg `freeze_time` and `travel_to`) instead.
  Include:
    - '**/spec/**/*'
  Safe: false

Gusto/SidekiqParams:
  Description: 'Sidekiq perform methods cannot take keyword arguments.'

Gusto/ToplevelConstants:
  Description: 'Prevents top-level constants from being defined outside of initializers.'
  Include:
    - '**/*.rb'
  Exclude:
    - '**/bin/*'
    - 'bin/*'
    - 'config/**/*'
    - 'lib/*.rb'
    - 'packs/**/{db/seeds,lib,config/initializers}/**/*'
    - 'script/**/*'
    - 'spec/rails_helper.rb'
    - '**/spec/support/**/*'
    - '**/*/spec_helper.rb'
    - 'spec/support/**/*.rb'

Gusto/UsePaintNotColorize:
  Description: 'Use Paint instead of colorize for terminal colors.'
  SafeAutoCorrect: false

Gusto/VcrRecordings:
  Description: 'VCR should be set to not record in tests. Use vcr: {record: :none}.'

Layout/BlockAlignment:
  EnforcedStyleAlignWith: start_of_block

Layout/CaseIndentation:
  EnforcedStyle: end
  IndentOneStep: false

Layout/DotPosition:
  Enabled: true
  # We use the (default) leading dot position for Sorbet and IDE compatibility.
  EnforcedStyle: leading

Layout/EmptyLineAfterGuardClause:
  Enabled: true

Layout/EmptyLineAfterMagicComment:
  Enabled: true

Layout/EmptyLineBetweenDefs:
  AllowAdjacentOneLineDefs: true

Layout/EmptyLinesAroundAttributeAccessor:
  # Conflicts with Layout/EmptyLinesAroundClassBody enforcing no_empty_lines style.
  Enabled: false

Layout/EmptyLinesAroundClassBody:
  EnforcedStyle: no_empty_lines

Layout/EmptyLinesAroundModuleBody:
  EnforcedStyle: no_empty_lines

Layout/EndAlignment:
  EnforcedStyleAlignWith: start_of_line

Layout/ExtraSpacing:
  AllowForAlignment: true

Layout/FirstArgumentIndentation:
  EnforcedStyle: consistent

Layout/FirstArrayElementIndentation:
  EnforcedStyle: consistent

Layout/FirstArrayElementLineBreak:
  Enabled: true

Layout/FirstHashElementIndentation:
  EnforcedStyle: consistent

Layout/FirstHashElementLineBreak:
  Enabled: true

Layout/FirstMethodArgumentLineBreak:
  Enabled: true

Layout/FirstMethodParameterLineBreak:
  Enabled: true

Layout/LineLength:
  # Apps and gems can set this as needed. We do not set a default maximum.
  # TODO: Pick some maximum like 200 to start with
  Enabled: false

Layout/MultilineArrayBraceLayout:
  EnforcedStyle: symmetrical

Layout/MultilineAssignmentLayout:
  # The two supported styles (start_of_line, start_of_assignment) each suit different contexts;
  # neither universally improves readability.
  Enabled: false

Layout/MultilineHashBraceLayout:
  EnforcedStyle: symmetrical

Layout/MultilineMethodCallBraceLayout:
  EnforcedStyle: symmetrical

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Layout/MultilineMethodDefinitionBraceLayout:
  EnforcedStyle: symmetrical

Layout/MultilineOperationIndentation:
  EnforcedStyle: indented

Layout/ParameterAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/SpaceAroundEqualsInParameterDefault:
  Enabled: true

Layout/SpaceAroundMethodCallOperator:
  Enabled: true

Layout/SpaceInLambdaLiteral:
  EnforcedStyle: require_space

Lint/AmbiguousBlockAssociation:
  Enabled: true
  Exclude:
    - '**/spec/**/*'

Lint/EmptyFile:
  Enabled: true

Lint/EnsureReturn:
  Enabled: true

Lint/RaiseException:
  Enabled: true

Lint/SelfAssignment:
  Severity: error

Lint/SharedMutableDefault:
  Enabled: true

Lint/StructNewOverride:
  # The cop flags any Struct subclass method that shadows a built-in, but intentional overrides
  # of methods like #to_s or #== are valid patterns.
  Enabled: false

Lint/UnexpectedBlockArity:
  Enabled: true
  Severity: error

Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

Lint/UselessConstantScoping:
  Enabled: true

Lint/Void:
  Severity: error

Metrics/AbcSize:
  # Complexity metrics are disabled to avoid excessive violations in existing code.
  # Enable selectively in packs that have been refactored to smaller, focused methods.
  Enabled: false

Metrics/BlockLength:
  # See Metrics/AbcSize. RSpec describe/context blocks commonly exceed the default limit.
  Enabled: false

Metrics/ClassLength:
  Enabled: true
  Max: 2500

Metrics/CyclomaticComplexity:
  # See Metrics/AbcSize.
  Enabled: false

Metrics/MethodLength:
  # See Metrics/AbcSize.
  Enabled: false

Metrics/ModuleLength:
  # See Metrics/AbcSize.
  Enabled: false

Metrics/PerceivedComplexity:
  # See Metrics/AbcSize.
  Enabled: false

Naming/MethodParameterName:
  # Common Ruby idioms use single-character names (e.g., |k, v| for hashes, |e| in rescue blocks);
  # enforcing a minimum length generates noisy violations without improving clarity.
  Enabled: false

Naming/PredicatePrefix:
  # Dropping the predicate can make code less understandable.
  # For example, `is_foo?` and `has_foo?` have different semantics,
  # but this rule would suggest they both be renamed `foo?`.
  Enabled: false

Naming/RescuedExceptionsVariableName:
  # The default enforces only `e`, but `error` and other descriptive names are equally valid;
  # no single convention is universally better.
  Enabled: false

Naming/VariableNumber:
  # Numbered names (e.g., user1, user2) are the most natural way to distinguish multiple similar objects in tests;
  # renaming to descriptive suffixes often adds no clarity.
  Enabled: false

Performance/CollectionLiteralInLoop:
  Enabled: true

Performance/OpenStruct:
  Enabled: true

Performance/RedundantBlockCall:
  # Disable this cop because we often declare blocks arguments for Sorbet sigs.
  Enabled: false

Performance/ZipWithoutBlock:
  Enabled: true

RSpec:
  Include:
    - '**/spec/**/*'

RSpec/ContainExactly:
  # contain_exactly and match_array are functionally identical; enforcing one over the other
  # would require churn with no readability benefit.
  Enabled: false

RSpec/ContextWording:
  Enabled: true

RSpec/DescribeClass:
  # We use non-class describe blocks extensively (e.g., feature specs, API endpoint specs).
  Enabled: false

RSpec/DescribeMethod:
  # Enforcing method name format in describe strings (e.g., requiring #foo or .bar prefixes) is too prescriptive;
  # teams use different conventions and none is universally better.
  Enabled: false

RSpec/DescribedClass:
  # Repeating the class name is sometimes clearer than described_class, particularly in nested contexts
  # where it's not immediately obvious what described_class refers to.
  Enabled: false

RSpec/ExampleLength:
  # Example length is not limited; comprehensive integration scenarios legitimately require more lines.
  Enabled: false

RSpec/ExampleWording:
  # Test description wording is highly context-dependent; teams use different styles
  # (imperative, declarative, behavioral) and none is universally better.
  Enabled: false

RSpec/ExpectChange:
  # Disable this cop because there's issues for either styles:
  # If `method_call` style, chained expectations (.by) does not work with `.by`.
  # If `block style, https://github.com/rubocop/rubocop/issues/7486.
  Enabled: false

RSpec/ExpectInHook:
  # We use expectations in before/after hooks for shared setup verification.
  Enabled: false

RSpec/IndexedLet:
  # When testing interactions between multiple instances of the same class, numbered names (user_1, user_2)
  # are the most natural way to distinguish them; descriptive alternatives often add no clarity.
  Enabled: false

RSpec/IteratedExpectation:
  Enabled: true

RSpec/LeadingSubject:
  Enabled: true

RSpec/LetSetup:
  # We use let! for eager evaluation even when the variable is not referenced in the example body.
  Enabled: false

RSpec/MessageChain:
  # This limits our use of the RSpec API with no real benefit
  Enabled: false

RSpec/MessageSpies:
  # The spy pattern (allow + have_received) and message expectation (expect + receive) are both valid;
  # each is clearer in different testing contexts and enforcing one style hurts readability in the other.
  Enabled: false

RSpec/MultipleExpectations:
  # Multiple expectations per example are acceptable to avoid fragmenting related assertions.
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  # Complex test setups legitimately require many let definitions.
  Enabled: false

RSpec/NamedSubject:
  # Named subjects add ceremony without benefit when the subject role is clear from context;
  # anonymous subjects are cleaner in the common case.
  Enabled: false

RSpec/NestedGroups:
  # We allow deeply nested context/describe groups to reflect complex scenario structures.
  Enabled: false

RSpec/NoExpectationExample:
  # Too many false positives. Even if we carefully set the AllowedPatterns config, there's not enough benefit.
  Enabled: false

RSpec/PredicateMatcher:
  # Predicate matchers can obscure failure messages and don't work for all predicate methods;
  # expect(foo.empty?).to be(true) is sometimes clearer than expect(foo).to be_empty.
  Enabled: false

RSpec/ReceiveMessages:
  # Consolidating stubs into receive_messages reduces legibility when each stub serves a different logical purpose
  # and shouldn't be visually grouped.
  Enabled: false

RSpec/ScatteredSetup:
  AutoCorrect: false

RSpec/SpecFilePathFormat:
  Enabled: true

RSpec/SpecFilePathSuffix:
  Enabled: true

RSpec/StubbedMock:
  # Setting both a stub and a message expectation on the same method is sometimes the clearest
  # way to express a test's setup and assertion without splitting them artificially.
  Enabled: false

RSpec/SubjectStub:
  # Stubbing the subject is sometimes necessary to isolate the behavior under test
  # from collaborator methods defined on the same object.
  Enabled: false

Rack/LowercaseHeaderKeys:
  Description: 'HTTP response header keys should be lowercase for consistency and compatibility with HTTP/2.'
  Enabled: true
  Include:
    - 'lib/middleware/**/*.rb'
    - 'app/middleware/**/*.rb'
    - 'app/controllers/**/*.rb'
    - 'packs/**/middleware/**/*.rb'
    - 'packs/**/controllers/**/*.rb'
    - 'components/**/middleware/**/*.rb'
    - 'components/**/controllers/**/*.rb'
    - 'config/initializers/**/*.rb'
  Exclude:
    - '**/spec/**/*'

Rake/Desc:
  Enabled: true

Security/YAMLLoad:
  Enabled: true

Sorbet:
  # TODO: validate these choices for Harmonization
  # BindingConstantWithoutTypeAlias
  # EnforceSigilOrder # verify this works with Teams annotations
  # ForbidUntypedStructProps
  # SignatureBuildOrder
  Enabled: true

Sorbet/FalseSigil:
  # We want to avoid `typed: ignore` as much as possible, as it breaks LSP tooling.
  Include:
    - "**/*.{rb,rbi,rake,ru}"

Sorbet/Refinement:
  # Still marked pending upstream, we contributed this and enable it here.
  Enabled: true

Sorbet/StrictSigil:
  # Forgot the difference between typed levels? (ignore, false, true, strict, and strong)
  # Check this out: https://sorbet.org/docs/static#file-level-granularity-strictness-levels
  Enabled: true
  Include:
    - "**/*.{rb,rbi,rake,ru}"
  Exclude:
    - bin/**/*
    - db/**/*.rb
    - script/**/*
    - spec/**/*spec.rb

Sorbet/ValidSigil:
  Enabled: true
  RequireSigilOnAllFiles: true
  # We don't want to require any specific typed level at this point – only that there IS a typed sigil.
  MinimumStrictness: ignore
  # We do suggest that the user type their file as `typed: strict`
  SuggestedStrictness: strict
  Exclude:
    - '**/db/migrate/**/*'
    - '**/*.{rake,arb,erb,rabl}'
    - '**/{Gemfile,Rakefile}'

Style/Alias:
  Enabled: true
  EnforcedStyle: prefer_alias_method

Style/ArgumentsForwarding:
  # This is incompatible with Sorbet
  Enabled: false

Style/AsciiComments:
  Enabled: true

Style/AutoResourceCleanup:
  Enabled: true

Style/BlockDelimiters:
  EnforcedStyle: line_count_based
  AllowedMethods:
    - it
    - expect
    - change

Style/ClassAndModuleChildren:
  # TODO: will this make our code safer? is it okay to use?
  # https://www.rubydoc.info/gems/rubocop/RuboCop/Cop/Style/ClassAndModuleChildren
  # EnforcedStyle: compact
  Enabled: false

Style/CollectionMethods:
  # The standard library aliases (collect, detect, find_all) are less widely known than map, find, select;
  # enforcing them would confuse developers coming from other languages.
  Enabled: false

Style/CommandLiteral:
  # This cop Style/CommandLiteral protects us from accidentally using backticks for strings quotes.
  # Forcing the use of %x() should make it more obvious visually where the command literals are.
  # This is easy to miss, but is a bug-without-test-failures at best and an opportunity for an
  # attack vector at worst.
  Enabled: true
  EnforcedStyle: percent_x

Style/ConditionalAssignment:
  EnforcedStyle: assign_inside_condition
  IncludeTernaryExpressions: false

Style/DoubleNegation:
  # The autocorrection replaces !! with !value.nil?, which changes semantics when value is false;
  # not a safe automated transform.
  Enabled: false

Style/EmptyMethod:
  EnforcedStyle: expanded

Style/ExpandPathArguments:
  Exclude:
    - '**/bin/*'

Style/ExponentialNotation:
  Enabled: true

Style/FormatString:
  # The codebase uses both % formatting and Kernel#format; enforcing one over the other
  # would require widespread refactoring with no functional benefit.
  Enabled: false

Style/FormatStringToken:
  EnforcedStyle: template

Style/FrozenStringLiteralComment:
  EnforcedStyle: always
  Enabled: true

# This can make lines longer and impair readability
Style/GuardClause:
  Enabled: false

Style/HashEachMethods:
  Enabled: true

Style/HashSyntax:
  EnforcedStyle: ruby19_no_mixed_keys

Style/IfInsideElse:
  # Restructuring if-inside-else to elsif is not always clearer, particularly when the branches
  # have different logic weights or asymmetric complexity.
  Enabled: false

Style/IfUnlessModifier:
  # Modifier if/unless form can impair readability and diff legibility; not enforced.
  Enabled: false

Style/ImplicitRuntimeError:
  # raise 'message' is idiomatic Ruby; requiring explicit RuntimeError adds noise.
  Enabled: false

Style/ItBlockParameter:
  Enabled: true
  EnforcedStyle: only_numbered_parameters

Style/Lambda:
  EnforcedStyle: literal

Style/LambdaCall:
  # proc.call() is more explicit and familiar across experience levels; the proc.() shorthand
  # is surprising to developers new to Ruby.
  Enabled: false

Style/MethodCallWithArgsParentheses:
  IgnoreMacros: true
  AllowedMethods:
    # Ruby
    - puts
    - raise
    - fail
    - exit
    - sleep
    # Rails
    - render
    - redirect_to
    - authorize!
    # Code loading
    - require
    - require_relative
    - require_dependency
    - load
    # Bundler
    - gem
    - ruby
    - source
    # Rspec
    - it
    - describe
    - context
    - to
    - not_to
    - to_not
    - be
    - be_a
    - be_an
    - be_between
    - be_falsey
    - be_kind_of
    - be_instance_of
    - be_truthy
    - be_within
    - eq
    - eql
    - end_with
    - include
    - match
    - raise_error
    - respond_to
    - start_with
    # Rake
    - task
    # Gem
    - add_dependency
    - add_development_dependency
    # Grape
    - resources
    - params
    - requires
    - desc
    - optional
    - get
    - post
    - put
    - delete
    # ActiveAdmin
    - belongs_to
    - sidebar
    - action_item
    - member_action
    - page_action
    - active_admin_form_for
    - h1
    - h2
    - h3
    - h4
    - register
    - register_page
    - index
    - column
    - humanized_column
    - panel
    - attributes_table_for
    - table_for
    - row
    - columns
    - div
    - span
    - para
    - text_node
    # fields.
    - input
    - action

Style/MethodCalledOnDoEndBlock:
  # The cop suggests converting do...end to braces to enable method chaining, but braces are harder
  # to read for multi-line blocks.
  Enabled: false

Style/MissingElse:
  # Requiring an else clause for every if/case statement would be unnecessarily verbose.
  Enabled: false

Style/ModuleFunction:
  # Sorbet does not enforce the singleton version of module function methods:
  # https://github.com/sorbet/sorbet/issues/8531
  # Even if did, requiring the code to typecheck both paths would be a pain for maintainability.
  # Also, it's better for the code to be explicit about which version of the method is being called,
  #  as it is one fewer decision the downstream developer has to make.
  Enabled: true
  EnforcedStyle: forbidden

Style/MultilineBlockChain:
  # Disabled in Standard https://github.com/standardrb/standard/blob/main/config/base.yml#L1431
  Enabled: false

Style/MultipleComparison:
  # Direct comparisons (a == x || a == y) are more explicit about what is being compared;
  # Array#include? subtly changes semantics and is less obvious at a glance.
  Enabled: false

Style/NegatedIf:
  # unless is unfamiliar to developers from other languages; negated if is universally understood
  # and avoiding churn is more valuable than enforcing the Ruby-specific form.
  Enabled: false

Style/NumericPredicate:
  # x == 0 is universally understood across languages; x.zero? is Ruby-specific and less intuitive,
  # particularly for developers newer to Ruby.
  Enabled: false

Style/OptionHash:
  # Options hashes remain common in DSL-style APIs (e.g., ActiveAdmin, Grape) and libraries
  # predating keyword arguments; converting them may break API compatibility.
  Enabled: false

Style/OptionalBooleanParameter:
  AllowedMethods:
    - respond_to_missing?
    - perform  # Sidekiq does not support keyword arguments.

Style/PercentLiteralDelimiters:
  PreferredDelimiters:
    default: '()'
    '%i': ()
    '%I': ()
    '%r': ()
    '%w': ()
    '%W': ()

Style/RaiseArgs:
  Enabled: true

Style/RedundantSelf:
  # Explicit self. distinguishes a method call from a local variable access, which signals
  # to the reader that the value may not be free to compute and should be cached if used
  # repeatedly. It is also sometimes needed for Sorbet type inference.
  Enabled: false

Style/RegexpLiteral:
  # The best delimiter for a regexp depends on its content; enforcing one style forces awkward
  # escaping when the pattern itself contains that delimiter character.
  Enabled: false

Style/RescueStandardError:
  Enabled: true
  AutoCorrect: true
  EnforcedStyle: 'implicit'

Style/Send:
  Enabled: true

Style/SingleLineBlockParams:
  # Naming every block parameter reduces the brevity that makes single-line blocks valuable;
  # meaningful names depend on context and can't be statically enforced.
  Enabled: false

Style/SlicingWithRange:
  # array[0..-1] is more widely understood across Ruby versions; array[0..] (endless range)
  # is a Ruby 2.6+ syntax that may be less familiar to some developers.
  Enabled: false

Style/SpecialGlobalVars:
  Enabled: true

Style/StringLiterals:
  # Enforcing single vs. double quotes would generate thousands of violations with no functional impact;
  # no consensus exists on a preference.
  Enabled: false

Style/StringMethods:
  Enabled: true

Style/SymbolArray:
  # The %i[] syntax is less familiar to developers new to Ruby; [:a, :b] is clearer in small
  # arrays and both forms are idiomatic in different contexts.
  Enabled: false

Style/SymbolProc:
  Enabled: true

Style/TernaryParentheses:
  # The two styles (require_parentheses vs. omit_parentheses) each improve readability in different cases;
  # the autocorrect often makes complex ternaries harder to read.
  Enabled: false

Style/TrailingCommaInArguments:
  Enabled: true
  # Matches Standard: https://github.com/standardrb/standard/blob/main/config/base.yml
  EnforcedStyleForMultiline: no_comma

Style/TrailingCommaInArrayLiteral:
  Enabled: true
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  Enabled: true
  EnforcedStyleForMultiline: consistent_comma

Style/TrivialAccessors:
  IgnoreClassMethods: true

Style/WhileUntilModifier:
  # The modifier form obscures control flow for complex conditions; the block form makes the loop
  # structure explicit and is generally preferred.
  Enabled: false

Style/WordArray:
  # The %w[] syntax is less familiar to developers new to Ruby; ['a', 'b'] is clearer in small
  # arrays and both forms are idiomatic in different contexts.
  Enabled: false

Style/YodaCondition:
  # Be cautious, the correction is not functionally identical
  Enabled: false
