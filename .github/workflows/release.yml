name: Release Gem

on:
  release:
    types: [published]

jobs:
  release:
    if: github.repository == 'gusto/rubocop-gusto'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          bundler-cache: false
          ruby-version: ruby
      - name: Install gems
        run: bundle install --jobs 4

      # Release
      - uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0

      - name: Upload gem to release
        continue-on-error: true  # May fail due to IP allow list restrictions
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" pkg/rubocop-gusto-*.gem
